sonar.projectKey=evflow-full-app
sonar.projectName=EVFlow

sonar.sources=backend-ev-flow/api,backend-ev-flow/scripts,backend-ev-flow/alembic,frontend-evflow-app/apps,frontend-evflow-app/packages
sonar.tests=backend-ev-flow/tests

# scratch/ holds one-off dev codegen scripts (generate_components.js /
# generate_icons.js) that are not shipped and not maintained to lint clean;
# exclude the whole dir (and the two files explicitly) from analysis.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.expo/**,**/*.min.js,**/scratch/**,**/scratch/generate_components.js,**/scratch/generate_icons.js

# --- Coverage reports (repo-root-relative paths; scanner baseDir = repo root) ---
# Backend: coverage.py -> Cobertura XML. Generated in CI from the repo root with
#   PYTHONPATH=backend-ev-flow pytest backend-ev-flow/tests --cov=api \
#     --cov-report=xml:backend-ev-flow/coverage.xml --cov-config=backend-ev-flow/.coveragerc
# so the <class filename> values are repo-root-relative (e.g. backend-ev-flow/api/db.py).
sonar.python.coverage.reportPaths=backend-ev-flow/coverage.xml
# Frontend: vitest v8 coverage -> lcov. SF paths are relative to frontend-evflow-app
# (e.g. packages/shared/src/validation.ts); the scanner resolves them against sonar.sources.
sonar.javascript.lcov.reportPaths=frontend-evflow-app/coverage/lcov.info

# --- Coverage exclusions (remove non-unit-tested code from the coverage DENOMINATOR) ---
# The "Coverage on New Code" gate must measure the coverage of unit-testable business
# logic honestly. The globs below drop code that is intentionally NOT unit-tested and is
# instead verified by the type/build pipeline (tsc --noEmit + vite build) and by e2e /
# manual QA, or is generated / batch tooling:
#   - **/*.tsx, frontend-evflow-app/apps/**, **/*Screen*  -> React/React Native UI views
#   - frontend-evflow-app/packages/ui/**, **/packages/maps/** -> presentational component
#     and map-integration packages (import react-native / leaflet; no headless unit surface)
#   - backend-ev-flow/scripts/**, backend-ev-flow/alembic/** -> CLI / batch / migration code
#   - backend-ev-flow/api/export_openapi.py -> CLI that dumps openapi.json to disk (no logic)
#   - backend-ev-flow/api/mailer.py -> thin SMTP side-effect wrapper (real network I/O; not unit-tested)
# Business logic stays IN the denominator: backend-ev-flow/api/** (incl. charging_repo,
# wallet_repo, pricing, security, main, db — all now covered by the DB-backed tests) and
# the pure-logic frontend-evflow-app/packages/shared/** modules remain covered.
sonar.coverage.exclusions=**/*.tsx,frontend-evflow-app/apps/**,**/*Screen*,frontend-evflow-app/packages/ui/**,frontend-evflow-app/packages/maps/**,**/scratch/**,backend-ev-flow/scripts/**,backend-ev-flow/alembic/**,backend-ev-flow/api/export_openapi.py,backend-ev-flow/api/mailer.py

sonar.python.version=3.12
sonar.sourceEncoding=UTF-8

# The server runs on a small (4 GB) host behind a Cloudflare tunnel and can
# stall past the default 60s under load; give requests more headroom.
sonar.ws.timeout=300
