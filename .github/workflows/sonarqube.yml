# SonarQube analysis on every push to main and on pull requests.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SONAR_HOST_URL  e.g. https://sonar.example.com — must be reachable from
#                   GitHub's runners, so a SonarQube on your laptop won't work;
#                   use the VPS deployment or a self-hosted runner.
#   SONAR_TOKEN     a project analysis token (My Account → Security → Generate)
#
# Until those are set, run sonarqube/scan.sh locally instead.

name: SonarQube

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Sonar can attribute new code correctly
          fetch-depth: 0

      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
