# SonarQube analysis on every push to main and on pull requests.
#
# Required repo secret (Settings → Secrets and variables → Actions →
# "Repository secrets", NOT Variables/Codespaces/Dependabot):
#   SONAR_TOKEN  a global analysis token (My Account → Security → Generate)
#
# The host URL is public anyway, so it is hardcoded below.

name: SonarQube

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    services:
      # PostGIS so the DB-gated backend tests (wallet / charging / auth / stations
      # money-path) actually run and count toward coverage instead of skipping.
      # The API talks to it via DATABASE_URL (set in the backend test step below).
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: evflow
          POSTGRES_PASSWORD: evflow
          POSTGRES_DB: evflow
        ports:
          - 5432:5432
        # Hold the job until Postgres accepts connections so alembic/seed/pytest
        # do not race the container's startup.
        options: >-
          --health-cmd "pg_isready -U evflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          # Full history so Sonar can attribute new code correctly
          fetch-depth: 0

      - name: Check SONAR_TOKEN is configured
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SONAR_TOKEN secret is empty. Add it under repo Settings → Secrets and variables → Actions → 'Repository secrets' (the Secrets tab, not Variables)."
            exit 1
          fi

      # --- Backend coverage (Python) ---------------------------------------
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          # Focused runtime + test deps that api/ and tests/ import. We do NOT
          # install the full requirements.txt on purpose: it pulls the heavy
          # data-science / geospatial stack (osmnx, geopandas, GDAL, kaggle,
          # jupyter) that the API does NOT import at runtime (the road graph is
          # loaded from cached GraphML via networkx alone), and which is slow
          # and prone to native-build failures in CI. bcrypt and PyJWT are
          # runtime imports of api/security.py that are missing from
          # requirements.txt (pre-existing gap) — installed explicitly here.
          # alembic runs the migrations that create the schema the DB tests need;
          # it is a CLI dep only (nothing under api/ imports it).
          pip install \
            fastapi pydantic pyyaml httpx \
            sqlalchemy 'psycopg[binary]' alembic \
            numpy networkx bcrypt PyJWT \
            'pytest>=8.0' 'pytest-cov>=5.0'

      - name: Run backend tests with coverage
        # DATABASE_URL points at the postgis service so the DB-gated tests
        # (wallet / charging / auth / stations) run instead of skipping and cover
        # the money-path modules. Migrate then seed before pytest:
        #   1. `alembic upgrade head` (from backend-ev-flow; env.py reads
        #      DATABASE_URL) builds the schema.
        #   2. `python -m scripts.seed_db` loads the 2931 committed stations
        #      (data/raw is in the repo) so stations tests have real rows.
        # Then run pytest from the repo root with PYTHONPATH=backend-ev-flow so
        # coverage.py (relative_files=True in .coveragerc) emits repo-root-
        # relative filenames (backend-ev-flow/api/...) that Sonar can map and so
        # `from api import ...` resolves.
        env:
          DATABASE_URL: postgresql+psycopg://evflow:evflow@localhost:5432/evflow
        run: |
          (cd backend-ev-flow && python -m alembic upgrade head)
          (cd backend-ev-flow && PYTHONPATH=. python -m scripts.seed_db)
          PYTHONPATH=backend-ev-flow python -m pytest backend-ev-flow/tests \
            --cov=api \
            --cov-report=xml:backend-ev-flow/coverage.xml \
            --cov-config=backend-ev-flow/.coveragerc

      # --- Frontend coverage (TypeScript) ----------------------------------
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend-evflow-app
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend-evflow-app
        run: npm run test:cov

      - name: Normalize frontend lcov paths to repo-root-relative
        # vitest runs with cwd=frontend-evflow-app, so lcov SF paths are
        # "packages/shared/...". The Sonar scanner's baseDir is the repo root and
        # its JS/TS LCOV importer resolves SF paths against baseDir WITHOUT the
        # suffix-search the Python importer does, so an unprefixed path resolves
        # to <repoRoot>/packages/shared/... which does not exist. Prefixing with
        # "frontend-evflow-app/" makes them repo-root-relative (mirroring the
        # backend coverage.xml), so they resolve to the indexed source files.
        run: sed -i 's#^SF:#SF:frontend-evflow-app/#' frontend-evflow-app/coverage/lcov.info

      - uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcube.opensoft.id
