# EV-FLOW deployment (host networking, LXC/OpenVZ-friendly).
#
#   cp .env.deploy.example .env      # optional: CORS_ALLOW_ORIGINS, WEB_CONCURRENCY, WEB_PORT
#   podman compose up -d --build db api web
#   podman compose exec api alembic upgrade head
#   podman compose exec api python -m scripts.seed_db
#
# The API binds 0.0.0.0:8000 on the host and the web UI binds 0.0.0.0:8080 by
# default. Put HTTPS in front with a Cloudflare Tunnel pointing at
# http://localhost:8080 (see DEPLOY.md); nginx proxies /api/ to the API.
#
# Why network_mode: host? Container-type VPSes (LXC/OpenVZ) block the iptables NAT that
# Podman's default bridge network needs, so `compose up` fails with an ip_tables error.
# Host mode skips the bridge entirely and works on both LXC and normal VMs.
# The API reaches Postgres on localhost:5432, and web reaches the API on localhost:8000.

services:
  db:
    image: docker.io/postgis/postgis:16-3.4
    container_name: ev-flow-db
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: evflow
      POSTGRES_PASSWORD: evflow
      POSTGRES_DB: evflow
    volumes:
      - pgdata:/var/lib/postgresql/data:Z

  api:
    build:
      context: .
      dockerfile: Containerfile
    image: ev-flow-api:latest
    container_name: ev-flow-api
    restart: unless-stopped
    network_mode: host
    environment:
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-2}"
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-*}"
      DATABASE_URL: "postgresql+psycopg://evflow:evflow@localhost:5432/evflow"
      XENDIT_SECRET_KEY: "${XENDIT_SECRET_KEY:-}"
      XENDIT_BASE_URL: "${XENDIT_BASE_URL:-https://api.xendit.co}"
      XENDIT_CALLBACK_TOKEN: "${XENDIT_CALLBACK_TOKEN:-}"
      JWT_SECRET: "${JWT_SECRET:-}"
      JWT_EXPIRE_MINUTES: "${JWT_EXPIRE_MINUTES:-10080}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI:-}"
      FRONTEND_URL: "${FRONTEND_URL:-}"
    volumes:
      # Station data (+ optional routing graph) live on the host, mounted read-only.
      # :Z relabels for SELinux hosts (Fedora/RHEL) and is harmless elsewhere.
      - ./data:/app/data:ro,Z

  web:
    build:
      context: ../frontend-evflow-app
      dockerfile: Containerfile
      args:
        VITE_EVFLOW_API_BASE_URL: "/"
    image: ev-flow-web:latest
    container_name: ev-flow-web
    restart: unless-stopped
    network_mode: host
    depends_on:
      - api
    environment:
      # Host networking has no compose DNS alias for "api", so proxy to the host port.
      EVFLOW_API_UPSTREAM: "http://127.0.0.1:8000"
      # Avoid binding privileged port 80 in rootless Podman. Override with WEB_PORT=80
      # only when your host allows it.
      NGINX_LISTEN_PORT: "${WEB_PORT:-8080}"

volumes:
  pgdata:
