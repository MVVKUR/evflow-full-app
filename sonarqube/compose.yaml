# SonarQube Community Edition + its own PostgreSQL, kept separate from the
# app stack so it can be started/stopped independently:
#
#   podman compose -f sonarqube/compose.yaml up -d
#   open http://localhost:9000        # first login: admin / admin
#
# JVM heaps are capped below so the whole stack fits a ~4 GB host alongside
# the EVFlow containers. Remove the *_JAVAOPTS lines on a bigger machine.
#
# Requires vm.max_map_count >= 262144 (Fedora default is higher already).

services:
  sonarqube:
    image: docker.io/sonarqube:community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_WEB_JAVAOPTS: "-Xmx512m -Xms256m"
      SONAR_CE_JAVAOPTS: "-Xmx512m -Xms256m"
      SONAR_SEARCH_JAVAOPTS: "-Xmx512m -Xms512m"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  sonar-db:
    image: docker.io/library/postgres:15
    container_name: sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_pgdata:
